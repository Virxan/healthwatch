apiVersion: v1
kind: Namespace
metadata:
  name: healthwatch
  labels:
    app.kubernetes.io/name: healthwatch

---
# Postgres credentials, consumed both by the Postgres pod itself and by
# the backend's DATABASE_URL. Fine as a plain Secret for a local/e2e
# cluster; swap for a real secrets manager before this ever sees
# production traffic.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: healthwatch
type: Opaque
stringData:
  POSTGRES_USER: healthwatch
  POSTGRES_PASSWORD: healthwatch
  POSTGRES_DB: healthwatch
  DATABASE_URL: postgres://healthwatch:healthwatch@postgres:5432/healthwatch?sslmode=disable

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: healthwatch
  labels:
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate # avoid two writers on the same volume during rollout
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata # avoid postgres choking on the volume's lost+found dir
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "healthwatch"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "healthwatch"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        # emptyDir is deliberate: this is a local/e2e cluster that gets
        # torn down by tests/e2e/e2e.sh on every run anyway. Swap for a
        # PersistentVolumeClaim if this cluster needs to outlive a
        # `task e2e` run.
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: healthwatch
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: healthwatch
  labels:
    app.kubernetes.io/name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: healthwatch-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: healthwatch
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
