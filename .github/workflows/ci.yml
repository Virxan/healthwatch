name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: go mod tidy
        working-directory: backend
        run: go mod tidy

      - run: go install mvdan.cc/gofumpt@latest
      - name: backend format check
        working-directory: backend
        run: |
          out="$(gofumpt -l .)"
          if [ -n "$out" ]; then echo "$out"; exit 1; fi

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: frontend lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: nix format check
        run: nix fmt -- --fail-on-change

      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck tests/e2e/*.sh

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: .markdownlint.json
          globs: |
            **/*.md
            !**/node_modules/**

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: go mod tidy
        working-directory: backend
        run: go mod tidy

      - name: unit tests
        working-directory: backend
        run: |
          go build ./...
          go test ./... -race -v

      - name: integration tests (Testcontainers - Docker is preinstalled on this runner)
        working-directory: backend
        run: go test -tags integration ./tests/integration/... -v

  container:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: build container with Nix
        run: nix build .#container -o result-container

      # anchore/sbom-action and anchore/scan-action's `path` input always
      # forces a "dir:" scan, it can't take a docker-archive: source
      # directly - load the tarball into the Docker daemon and reference
      # it by tag instead (the pattern Anchore's own docs use).
      - name: load image into Docker
        run: docker load < result-container

      - name: generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: healthwatch-backend:latest
          format: spdx-json
          output-file: sbom.spdx.json

      - name: scan for CVEs
        uses: anchore/scan-action@v7
        with:
          image: healthwatch-backend:latest
          fail-build: true
          severity-cutoff: medium

      - name: upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: push image
        if: github.ref == 'refs/heads/main'
        run: |
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag healthwatch-backend:latest "ghcr.io/${repo_lower}:latest"
          docker tag healthwatch-backend:latest "ghcr.io/${repo_lower}:${{ github.sha }}"
          docker push "ghcr.io/${repo_lower}:latest"
          docker push "ghcr.io/${repo_lower}:${{ github.sha }}"
