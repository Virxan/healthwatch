name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go install mvdan.cc/gofumpt@latest
      - name: format check
        run: |
          out="$(gofumpt -l .)"
          if [ -n "$out" ]; then echo "$out"; exit 1; fi
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: yamllint
        run: |
          pip install --quiet yamllint
          yamllint -c .yamllint.yaml deploy/ argocd/ .github/workflows/ \
            lefthook.yml .golangci.yml .yamllint.yaml

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: .markdownlint.json
          globs: "**/*.md"

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go test ./... -race -v

  container:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: build container with Nix
        run: nix build .#container -o result-container

      # anchore/sbom-action and anchore/scan-action's `path` input always
      # forces a "dir:" scan, it can't take a docker-archive: source
      # directly - load the tarball into the Docker daemon and reference
      # it by tag instead (this is the pattern Anchore's own docs use).
      - name: load image into Docker
        run: docker load < result-container

      - name: generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: healthwatch:latest
          format: spdx-json
          output-file: sbom.spdx.json

      - name: scan for CVEs
        uses: anchore/scan-action@v7
        with:
          image: healthwatch:latest
          fail-build: true
          severity-cutoff: medium

      - name: upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: push image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag healthwatch:latest ghcr.io/${{ github.repository }}:latest
          docker tag healthwatch:latest ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
