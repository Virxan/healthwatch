apiVersion: v1
kind: ConfigMap
metadata:
  name: healthwatch-targets
  namespace: healthwatch
  labels:
    app.kubernetes.io/name: healthwatch
data:
  targets.yaml: |
    targets:
      - name: example
        url: https://example.com
        interval_seconds: 30
        timeout_seconds: 5

      - name: github
        url: https://github.com
        interval_seconds: 30
        timeout_seconds: 5

      - name: anthropic
        url: https://www.anthropic.com
        interval_seconds: 60
        timeout_seconds: 5
