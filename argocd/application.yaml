apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: healthwatch
  namespace: argocd
spec:
  project: default

  # TODO: point this at your own fork/remote once you've pushed this repo -
  # Argo CD needs a git URL it can reach from inside the cluster, it can't
  # track your local, uncommitted working copy.
  source:
    repoURL: https://github.com/REPLACE_ME/healthwatch.git
    targetRevision: HEAD
    path: deploy

  destination:
    server: https://kubernetes.default.svc
    namespace: healthwatch

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
