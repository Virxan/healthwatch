pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.go"
      run: out="$(gofumpt -l {staged_files})"; if [ -n "$out" ]; then echo "$out"; exit 1; fi
      fail_text: "files are not gofumpt-formatted - run `just fmt`"
    lint:
      glob: "*.go"
      run: golangci-lint run ./...
    secrets:
      run: gitleaks protect --staged --no-banner --redact
